<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select>
        <option> India</option>
        <option >Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>
        <option selected>country</option>
        <option label="USA">United States of America</option>
    </select>

    <select multiple>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select required>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

    <select size="2">
        <option> India</option>
        <option >Russia</option>
        <option>Japan</option>
        <option>Germany</option>
        <option selected>country</option>
        <option label="USA">United States of America</option>
    </select>

    <select disabled>
        <option>Delhi</option>
        <option>Mumbai</option>
    </select>

</body>
</html>
